{% extends "core/base.html" %}
{% load static %}

{% block content %}

<style>
    .insights-wrapper {
        width: 95%;
        max-width: 1600px;
        margin: 40px auto;
        color: white;
    }

.insight-box {
    background: rgba(255,255,255,0.06);
    border-left: 4px solid #38bdf8;
    border-radius: 16px;
    padding: 18px 24px;
    margin-bottom: 40px;
    backdrop-filter: blur(12px);

    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.chart-heading {
    text-align: center;
    width: 100%;
    margin-bottom: 18px;
    font-weight: 700;
}

    .chart-card {
        background: rgba(8,15,35,0.55);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 22px;
        padding: 25px;
        margin-bottom: 35px;
        backdrop-filter: blur(12px);
    }

    .timeline-container {
        height: 420px;
        width: 100%;
    }

    .pie-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        margin-top: 20px;
    }

    .pie-container {
        height: 310px;
        width: 100%;
        position: relative;
    }
    .insights-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
}
    .insights-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 35px;
    }

    canvas {
        width: 100% !important;
        height: 100% !important;
    }

    @media (max-width: 1100px) {
        .pie-grid {
            grid-template-columns: 1fr;
        }
    }
</style>


<div class="insights-wrapper">

    <div class="insights-header">
        <h1 class="mb-4">📊 Mental Health Insights</h1>

        <div class="insight-box">
            <h5>🧠 Insight</h5>
            <p class="mb-0">{{ data.insight }}</p>
        </div>
    </div>

    <!-- TIMELINE -->
    <div class="chart-card">
        <h4 class="chart-heading">Combined Emotion Timeline</h4>
        <div class="timeline-container">
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <!-- PIE CHARTS -->
    <div class="pie-grid">

        <div class="chart-card">
            <h5 class="chart-heading">Combined Distribution</h5>
            <div class="pie-container">
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <h5 class="chart-heading">Facial Distribution</h5>
            <div class="pie-container">
                <canvas id="faceChart"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <h5 class="chart-heading">Voice Distribution</h5>
            <div class="pie-container">
                <canvas id="voiceChart"></canvas>
            </div>
        </div>

    </div>

</div>

<script id="data-script" type="application/json">
{
    "emotions": {{ data.emotion_list|safe }},
    "timestamps": {{ data.timestamps|safe }},
    "counts": {{ data.emotion_counts|safe }},
    "faceCounts": {{ data.face_counts|safe }},
    "voiceCounts": {{ data.voice_counts|safe }}
}
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const rawData = JSON.parse(
        document.getElementById("data-script").textContent
    );

    const emotions = rawData.emotions || [];
    const timestamps = rawData.timestamps || [];
    const counts = rawData.counts || {};
    const faceCounts = rawData.faceCounts || {};
    const voiceCounts = rawData.voiceCounts || {};

    const emotionMap = {
        angry: 0,
        fear: 1,
        sad: 2,
        neutral: 3,
        happy: 4
    };

    const reverseMap = {
        0: "Angry",
        1: "Fear",
        2: "Sad",
        3: "Neutral",
        4: "Happy"
    };

    const values = emotions.map(e => emotionMap[e] ?? 2);

    new Chart(document.getElementById("lineChart"), {
        type: "line",
        data: {
            labels: timestamps,
            datasets: [{
                label: "Emotion Trend",
                data: values,
                borderColor: "#4facfe",
                borderWidth: 3,
                tension: 0.4,
                pointRadius: 4,
                fill: false
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: { color: "#fff" }
                }
            },
            scales: {
                x: {
                    ticks: { color: "#aaa" }
                },
                y: {
                    min: 0,
                    max: 4,
                    ticks: {
                        stepSize: 1,
                        color: "#fff",
                        callback: value => reverseMap[value]
                    }
                }
            }
        }
    });

function buildPie(canvasId, dataset) {
    new Chart(document.getElementById(canvasId), {
        type: "pie",
        data: {
            labels: Object.keys(dataset),
            datasets: [{
                data: Object.values(dataset),
                radius: '82%',
                backgroundColor: [
                    "#4facfe",
                    "#ff6b6b",
                    "#feca57",
                    "#1dd1a1",
                    "#5f27cd"
                ]
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,

            layout: {
                padding: {
                    top: 10,
                    bottom: 10
                }
            },

            plugins: {
                legend: {
                    display: true,
                    position: "bottom",
                    align: "center",
                    maxHeight: 60,
                    labels: {
                        color: "#fff",
                        padding: 18,
                        boxWidth: 14,
                        font: {
                            size: 13
                        }
                    }
                }
            }
        }
    });
}
    buildPie("pieChart", counts);
    buildPie("faceChart", faceCounts);
    buildPie("voiceChart", voiceCounts);

});
</script>

{% endblock %}

{% block background %}
<script>
window.emotionCounts = {{ data.emotion_counts|safe }};
</script>
<script src="{% static 'core/js/insights.js' %}"></script>
{% endblock %}
